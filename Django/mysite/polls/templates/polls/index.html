{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Polls</title>
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
</head>
<body>

<h1>Polls</h1>

<ul>
    {% for question in latest_question_list %}
        <li>
            <a href="/polls/{{ question.id }}/">
                {{ question.question_text }}
            </a>
        </li>
    {% endfor %}
</ul>

</body>
</html>
