<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body>

<h1>{{ question.question_text }}</h1>

<ul>
    {% for choice in question.choice_set.all %}
        <li>
            {{ choice.choice_text }} — {{ choice.votes }} votes
        </li>
    {% endfor %}
</ul>

<a href="/polls/{{ question.id }}/">Vote again</a>

</body>
</html>
